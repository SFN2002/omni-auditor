name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Threshold set to 75% (not 85%) because UI/Rich console code is
      # difficult to validate in a headless CI environment.
      - name: Run tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pip install -e .
          pip install pytest pytest-cov
          pytest --cov=src --cov-report=xml --cov-report=term-missing --cov-fail-under=75

      - name: Compile VS Code extension
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          cd vscode-extension
          npm install
          npm run compile

      - name: Package VS Code extension
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          cd vscode-extension
          npx vsce package --out omni-auditor.vsix

      - name: Upload .vsix artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: omni-auditor-vsix
          path: vscode-extension/omni-auditor.vsix
