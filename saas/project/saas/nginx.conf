# ═══════════════════════════════════════════════════════════════════════════
# Omni-Auditor SaaS Dashboard — Nginx Reverse Proxy Configuration
# Routes API calls to backend, static files to frontend, with WebSocket
# support, gzip compression, and proper header forwarding.
# ═══════════════════════════════════════════════════════════════════════════

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:5173;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;

server {
    listen 80;
    server_name localhost;

    # Client body size limit (50MB for SARIF exports)
    client_max_body_size 50M;

    # ─── Gzip Compression ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff2;

    # ─── Security Headers ─────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Proxy Headers (forwarded to upstreams) ──────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # ─── Timeouts ─────────────────────────────────────────────────────────
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ─── API Routes → Backend ─────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend;
        proxy_redirect off;
    }

    # ─── API Docs → Backend ───────────────────────────────────────────────
    location /docs {
        proxy_pass http://backend/docs;
        proxy_redirect off;
    }

    location /redoc {
        proxy_pass http://backend/redoc;
        proxy_redirect off;
    }

    location /openapi.json {
        proxy_pass http://backend/openapi.json;
        proxy_redirect off;
    }

    # ─── WebSocket Support → Backend ──────────────────────────────────────
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── Everything Else → Frontend ───────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_redirect off;

        # WebSocket support for Vite HMR
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
